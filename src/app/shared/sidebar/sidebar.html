<aside class="sidebar">
    <div class="sidebar__brand">
        <div class="sidebar__logo">
            <i class="ri-building-4-line"></i>
        </div>
        <div>
            <p class="sidebar__company">Opsentra</p>
            <p class="sidebar__subtitle">All-in-one ERP</p>
        </div>
    </div>

    <nav class="sidebar__nav">
        <a routerLink="/apps" routerLinkActive="active" class="nav-item nav-item--setup">
            <i class="ri-apps-2-add-line"></i>
            <span>Add Apps</span>
        </a>

        <a routerLink="/home" routerLinkActive="active" class="nav-item nav-item--home">
            <i class="ri-dashboard-line"></i>
            <span>Dashboard</span>
        </a>

        <div class="sidebar__section" *ngFor="let group of visibleGroups">
            <p class="sidebar__section-title">{{ group.title }}</p>
            <a
                *ngFor="let link of group.links"
                [routerLink]="link.route"
                routerLinkActive="active"
                class="nav-item"
            >
                <i [class]="link.icon"></i>
                <span>{{ link.label }}</span>
            </a>
        </div>
    </nav>
</aside>
