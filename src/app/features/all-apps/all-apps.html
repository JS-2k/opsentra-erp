<div class="menu-setup-shell">
    <section class="menu-setup-panel">
        <header class="menu-setup-header">
            <div class="menu-setup-header__copy">
                <h1>Configure your ERP workspace</h1>
            </div>

            <div class="menu-setup-header__aside">
                <button type="button" class="menu-tool" (click)="openCustomizePopup()">
                    <i class="ri-tools-line"></i>
                    <span>Customize app</span>
                </button>
            </div>
        </header>



        <section class="menu-grid" aria-label="Module selection">
            <label
                *ngFor="let group of groups"
                class="menu-card"
                [class.menu-card--active]="selected.has(group.key)"
                [ngClass]="group.accent"
            >
                <div class="menu-card__icon" [ngClass]="group.accent" aria-hidden="true">
                    <i [class]="group.icon"></i>
                </div>

                <div class="menu-card__body">
                    <div class="menu-card__row">
                        <div class="menu-card__text">
                            <h2>{{ group.title }}</h2>
                            <p>{{ group.description }}</p>
                        </div>
                        <span class="menu-card__check" [class.menu-card__check--on]="selected.has(group.key)">
                            <i class="ri-check-line"></i>
                        </span>
                    </div>
                </div>

                <input
                    class="menu-card__input"
                    type="checkbox"
                    [checked]="selected.has(group.key)"
                    (change)="toggle(group.key)"
                    aria-label="Select {{ group.title }}"
                />
            </label>
        </section>

        <footer class="menu-actions">
            <button type="button" class="menu-actions__secondary" (click)="selectAll()">
                Select all
            </button>

            <button type="button" class="menu-actions__primary" (click)="saveSelection()">
                <span>Save and continue</span>
                <i class="ri-arrow-right-line"></i>
            </button>
        </footer>

        <p class="menu-setup-footer">Powered by Opsentra</p>
    </section>

    <div class="menu-modal-backdrop" *ngIf="showCustomizePopup" (click)="closeCustomizePopup()">
        <div class="menu-modal" (click)="$event.stopPropagation()">
            <button type="button" class="menu-modal__close" aria-label="Close popup" (click)="closeCustomizePopup()">
                <i class="ri-close-line"></i>
            </button>

            <p class="menu-modal__kicker">Contact us</p>
            <h2>Need a custom app layout?</h2>
            <p class="menu-modal__copy">
                If you want us to tailor the ERP menus, workflows, or module structure for your team,
                contact us and we can help you customize it.
            </p>

            <div class="menu-modal__info">
                <div>
                    <span>Email</span>
                    <strong>support@opsentra.com</strong>
                </div>
                <div>
                    <span>Phone</span>
                    <strong>+91 98765 43210</strong>
                </div>
            </div>

            <div class="menu-modal__actions">
                <a class="menu-modal__link" href="mailto:support@opsentra.com">Contact us</a>
                <button type="button" class="menu-modal__secondary" (click)="closeCustomizePopup()">Close</button>
            </div>
        </div>
    </div>
</div>
