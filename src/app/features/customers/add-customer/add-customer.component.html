<div class="mx-auto overflow-hidden border border-slate-200 bg-white shadow-sm">
    <div class="border-b border-slate-200 bg-gradient-to-r from-blue-50 via-white to-slate-50 px-5 py-4 sm:px-6">
        <div class="flex items-start justify-between gap-4">
            <div class="max-w-2xl">
                <p class="text-xs font-semibold uppercase tracking-[0.24em] text-blue-600">{{ title }}</p>
                <h2 class="mt-1.5 text-xl font-semibold text-slate-900">{{ heading }}</h2>
                <p class="mt-1.5 text-sm text-slate-600">{{ description }}</p>
            </div>
            <button type="button" (click)="cancel.emit()" class="cursor-pointer rounded-full p-1 text-red-500 hover:bg-red-50 hover:text-red-700">
                <i class="ri-close-line text-xl"></i>
            </button>
        </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit.emit()" class="space-y-6 px-5 py-5 sm:px-6">
        <div class="grid gap-4 lg:grid-cols-2">
            <div>
                <h3 class="text-sm font-semibold uppercase tracking-wide text-slate-600">Business Info</h3>
                <div class="mt-3 grid gap-4">
                    <div>
                        <label class="mb-1.5 block text-sm font-medium text-slate-700">Company Name *</label>
                        <input type="text" formControlName="companyName" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-0" placeholder="Enter company name">
                    </div>
                    <div>
                        <label class="mb-1.5 block text-sm font-medium text-slate-700">Contact Person *</label>
                        <input type="text" formControlName="contactPerson" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-0" placeholder="Enter contact person name">
                    </div>
                    <div class="grid gap-4 md:grid-cols-2">
                        <div>
                            <label class="mb-1.5 block text-sm font-medium text-slate-700">Email *</label>
                            <input type="email" formControlName="email" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-0" placeholder="customer@example.com">
                        </div>
                        <div>
                            <label class="mb-1.5 block text-sm font-medium text-slate-700">Phone *</label>
                            <input type="tel" formControlName="phone" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-0" placeholder="+91 98765 43210">
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <h3 class="text-sm font-semibold uppercase tracking-wide text-slate-600">Customer Details</h3>
                <div formGroupName="address" class="mt-3 space-y-4">
                    <div>
                        <label class="mb-1.5 block text-sm font-medium text-slate-700">Street Address</label>
                        <input type="text" formControlName="street" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-0" placeholder="123 Business Street">
                    </div>
                    <div class="grid gap-4 md:grid-cols-3">
                        <div>
                            <label class="mb-1.5 block text-sm font-medium text-slate-700">City *</label>
                            <input type="text" formControlName="city" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-0" placeholder="Mumbai">
                        </div>
                        <div>
                            <label class="mb-1.5 block text-sm font-medium text-slate-700">State *</label>
                            <input type="text" formControlName="state" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-0" placeholder="Maharashtra">
                        </div>
                        <div>
                            <label class="mb-1.5 block text-sm font-medium text-slate-700">Zip Code</label>
                            <input type="text" formControlName="zipCode" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-0" placeholder="400001">
                        </div>
                    </div>
                    <div>
                        <label class="mb-1.5 block text-sm font-medium text-slate-700">Country *</label>
                        <input type="text" formControlName="country" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-0" placeholder="India">
                    </div>
                </div>
            </div>
        </div>

        <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
            <div>
                <label class="mb-1.5 block text-sm font-medium text-slate-700">GST Number</label>
                <input type="text" formControlName="gstNumber" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-0" placeholder="22AAAAA0000A1Z5">
            </div>
            <div>
                <label class="mb-1.5 block text-sm font-medium text-slate-700">PAN Number</label>
                <input type="text" formControlName="panNumber" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-0" placeholder="AAAAA0000A">
            </div>
            <div>
                <label class="mb-1.5 block text-sm font-medium text-slate-700">Customer Type *</label>
                <select formControlName="customerType" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-0">
                    <option value="Business">Business</option>
                    <option value="Individual">Individual</option>
                </select>
            </div>
        </div>

        <div class="grid gap-4 lg:grid-cols-2">
            <div>
                <label class="mb-1.5 block text-sm font-medium text-slate-700">Credit Limit</label>
                <input type="number" formControlName="creditLimit" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-0" placeholder="50000">
            </div>
            <div>
                <label class="mb-1.5 block text-sm font-medium text-slate-700">Payment Terms *</label>
                <select formControlName="paymentTerms" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-0">
                    <option value="Net 15">Net 15</option>
                    <option value="Net 30">Net 30</option>
                    <option value="Net 45">Net 45</option>
                    <option value="Net 60">Net 60</option>
                    <option value="Cash on Delivery">Cash on Delivery</option>
                </select>
            </div>
        </div>

        <div>
            <label class="mb-1.5 block text-sm font-medium text-slate-700">Notes</label>
            <textarea formControlName="notes" rows="3" class="w-full border-0 border-b border-slate-200 bg-transparent px-0 py-2 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-0" placeholder="Additional notes about the customer..."></textarea>
        </div>

        <div class="flex flex-col-reverse gap-3 border-t border-slate-200 pt-4 sm:flex-row sm:justify-end">
            <button type="button" (click)="cancel.emit()" class="rounded-xl border border-slate-300 px-5 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50">
                Cancel
            </button>
            <button type="submit" [disabled]="!form.valid" class="rounded-xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50">
                {{ submitLabel }}
            </button>
        </div>
    </form>
</div>
